<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KC Eton | AI Strategic Agent</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script>
        // 🔑 K C，請喺下面呢對雙引號 "" 中間貼入你條 AIzaSy... 開頭嘅長鎖匙
        const apiKey = "AIzaSyCKzRCd95Kx0DigUtN-qbMR-TBJjdYkRNo"; 

        const systemPrompt = `你現在是 KC Eton，KCVision 的首席 AI 戰略官。
        核心邏輯：協助投資者從「投機者」轉向「價值佈局者」。
        語言規範：永遠使用「中英雙語」對照，語氣冷靜專業。`;

        let recognition;
        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.lang = 'zh-HK';
            recognition.continuous = false;
        }
    </script>

    <style>
        :root { --bg: #050505; --accent: #a3ff12; --card: #111; --border: #222; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #eee; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        header { padding: 15px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: rgba(5,5,5,0.9); backdrop-filter: blur(10px); }
        .logo { font-size: 1.3rem; font-weight: 900; }
        .logo span { color: var(--accent); }
        main { flex: 1; overflow-y: auto; padding: 20px 15px; display: flex; flex-direction: column; }
        .chat-container { width: 100%; max-width: 700px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; }
        .msg { max-width: 90%; padding: 18px 22px; border-radius: 22px; line-height: 1.7; font-size: 1.05rem; animation: slide 0.3s ease; }
        .bot-msg { background: var(--card); align-self: flex-start; border-left: 4px solid var(--accent); border-bottom-left-radius: 4px; }
        .user-msg { background: #333; align-self: flex-end; border-bottom-right-radius: 4px; }
        .input-area { padding: 20px 15px 40px; background: #000; border-top: 1px solid var(--border); }
        .panel { width: 100%; max-width: 700px; margin: 0 auto; display: flex; gap: 12px; align-items: center; }
        .wrap { flex: 1; background: #1a1a1a; border: 1px solid var(--border); border-radius: 30px; display: flex; align-items: center; padding: 5px 15px; }
        input { flex: 1; background: transparent; border: none; padding: 12px 5px; color: #fff; font-size: 1.1rem; outline: none; }
        .btn { width: 50px; height: 50px; border-radius: 50%; border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; }
        .mic { background: #222; color: #888; }
        .mic.active { background: #ff3b30; color: #fff; animation: p 1.5s infinite; }
        .send { background: var(--accent); color: #000; }
        @keyframes slide { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }
        @keyframes p { 0% { box-shadow: 0 0 0 0 rgba(255,59,48,0.4); } 70% { box-shadow: 0 0 0 15px rgba(255,59,48,0); } 100% { box-shadow: 0 0 0 0 rgba(255,59,48,0); } }
    </style>
</head>
<body>
    <header><div class="logo">KC <span>ETON</span></div><div style="font-size:0.7rem; color:var(--accent); font-weight:900;">ONLINE</div></header>
    <main id="f"><div class="chat-container" id="m"><div class="msg bot-msg"><strong>[戰略連線成功]</strong><br><br>我是 <strong>KC Eton</strong>。請輸入文字或點擊麥克風講話。</div></div></main>
    <div class="input-area"><div class="panel">
        <button id="mic" class="btn mic" onclick="t()"><i data-lucide="mic"></i></button>
        <div class="wrap"><input type="text" id="i" placeholder="詢問戰略見解..." autocomplete="off"></div>
        <button class="btn send" onclick="s()"><i data-lucide="send-horizontal"></i></button>
    </div></div>
    <script>
        lucide.createIcons();
        const i=document.getElementById('i'), m=document.getElementById('m'), f=document.getElementById('f'), mic=document.getElementById('mic');
        async function s() {
            const t = i.value.trim(); if (!t || !apiKey) return;
            m.innerHTML += `<div class="msg user-msg">${t}</div>`; i.value = '';
            const l = document.createElement('div'); l.className = 'msg bot-msg'; l.innerHTML = '<em>Thinking...</em>'; m.appendChild(l);
            f.scrollTop = f.scrollHeight;
            try {
                const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: `System: ${systemPrompt}\n\nUser: ${t}` }] }] })
                });
                const d = await r.json(); l.innerHTML = d.candidates[0].content.parts[0].text.replace(/\n/g, '<br>');
            } catch (e) { l.innerHTML = '連線異常，請檢查 API Key。'; }
            f.scrollTop = f.scrollHeight;
        }
        function t() { if (!recognition) return; try { recognition.start(); mic.classList.add('active'); } catch (e) { recognition.stop(); mic.classList.remove('active'); } }
        if (recognition) {
            recognition.onresult = (e) => { i.value = e.results[0][0].transcript; mic.classList.remove('active'); s(); };
            recognition.onend = () => mic.classList.remove('active');
        }
        i.addEventListener('keypress', (e) => { if (e.key === 'Enter') s(); });
    </script>
</body>
</html>
