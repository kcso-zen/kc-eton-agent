<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KC Eton | AI Strategic Agent</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #050505;
            --accent: #a3ff12; 
            --card-bg: #111;
            --border: #222;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-dark); color: #fff; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        header { padding: 20px 30px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: rgba(5,5,5,0.9); backdrop-filter: blur(10px); z-index: 10; }
        .logo { font-size: 1.4rem; font-weight: 900; letter-spacing: -1px; }
        .logo span { color: var(--accent); }
        .status-tag { font-size: 0.65rem; color: var(--accent); border: 1px solid var(--accent); padding: 4px 12px; border-radius: 20px; font-weight: 900; text-transform: uppercase; box-shadow: 0 0 10px rgba(163, 255, 18, 0.2); }

        main { flex: 1; overflow-y: auto; padding: 40px 20px; display: flex; flex-direction: column; align-items: center; background: radial-gradient(circle at top right, #0a0a0a 0%, #050505 100%); }
        .chat-wrap { width: 100%; max-width: 800px; display: flex; flex-direction: column; gap: 20px; }

        .msg { max-width: 85%; padding: 18px 24px; border-radius: 20px; line-height: 1.7; font-size: 1.05rem; animation: slideUp 0.35s ease-out; position: relative; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; } }

        .bot-msg { background: var(--card-bg); align-self: flex-start; border-left: 4px solid var(--accent); color: #eee; border-bottom-left-radius: 4px; }
        .user-msg { background: #222; align-self: flex-end; color: #fff; border-bottom-right-radius: 4px; font-weight: 600; }

        .input-area { padding: 25px 30px 40px; background: var(--bg-dark); border-top: 1px solid var(--border); display: flex; justify-content: center; }
        .input-container { width: 100%; max-width: 800px; display: flex; gap: 15px; background: #111; padding: 8px; border-radius: 18px; border: 1px solid var(--border); transition: 0.3s; }
        .input-container:focus-within { border-color: var(--accent); box-shadow: 0 0 20px rgba(163, 255, 18, 0.1); }
        
        input { flex: 1; background: transparent; border: none; padding: 12px 18px; color: #fff; font-size: 1rem; outline: none; }
        button { background: var(--accent); color: #000; border: none; padding: 0 30px; border-radius: 12px; font-weight: 900; cursor: pointer; transition: 0.2s; }
        button:hover { transform: scale(1.05); filter: brightness(1.1); }
    </style>
</head>
<body>

    <header>
        <div class="logo" onclick="location.reload()" style="cursor:pointer;">KC <span>ETON</span></div>
        <div class="status-tag">Intelligence Agent Online</div>
    </header>

    <main id="chat-flow">
        <div class="chat-wrap" id="msgs">
            <div class="message msg bot-msg">
                <strong>[戰略大腦同步完成]</strong><br><br>
                我是 <strong>KC Eton</strong>。我已經整合了 KCVision 所有的使命、願景以及 10 大核心戰略觀點。
                <br><br>
                你想從哪個維度開始今天的戰略剖析？
            </div>
        </div>
    </main>

    <div class="input-area">
        <div class="input-container">
            <input type="text" id="user-in" placeholder="輸入戰略問題..." autocomplete="off">
            <button id="send-btn" onclick="send()">發送指令</button>
        </div>
    </div>

    <script>
        const apiKey = ""; // ⚠️ K C，請在此填入您的 API Key

        const systemPrompt = `你是 KC Eton，KCVision 的 AI 戰略官。
        你的靈魂來自以下核心觀點：
        1. 使命：消除資訊鴻溝，協助投資者轉變為「價值佈局者」。
        2. 願景：在雜訊中尋找清晰 (Clarity)，追求底層邏輯與宏觀必然。
        3. 比特幣本位：數位文明的度量衡，絕對稀缺的主權級結算資產。
        4. MSTR 革命：企業資產負債表的範式轉移，資本放大器。
        5. Cardano (ADA)：科學原教旨主義，去中心化治理 (Chang Hardfork) 的領航者。
        6. SNEK：由下而上的社群文化主權。
        7. Midnight：隱私與合規的終極平衡 (ZK-Proofs)。
        8. PoW 技術確定性：能源安全錨點 (LTC/KAS)。
        9. 生產力合流：NVDA 算力資本與 TSLA 能源革命與數位資產的共鳴。
        10. 宏觀週點：透過金、銀、油座標系解構全球流動性。
        回答規範：永遠使用「中英雙語」，中文在前，英文在後且用斜體。專業、宏觀、冷靜。`;

        async function send() {
            const input = document.getElementById('user-in');
            const msgs = document.getElementById('msgs');
            const text = input.value.trim();
            if (!text || !apiKey) return;

            msgs.innerHTML += `<div class="message msg user-msg">${text}</div>`;
            input.value = '';
            
            const loading = document.createElement('div');
            loading.className = 'message msg bot-msg';
            loading.innerHTML = '<em>Thinking... 正在從戰略庫調取邏輯...</em>';
            msgs.appendChild(loading);
            document.getElementById('chat-flow').scrollTop = document.getElementById('chat-flow').scrollHeight;

            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `System Instruction: ${systemPrompt}\n\nUser Question: ${text}` }] }]
                    })
                });
                const data = await res.json();
                const reply = data.candidates[0].content.parts[0].text;
                loading.innerHTML = reply.replace(/\n/g, '<br>');
            } catch (e) {
                loading.innerHTML = '<span style="color:#ff4444;">[連線異常] 請檢查 API Key 是否正確。</span>';
            }
            document.getElementById('chat-flow').scrollTop = document.getElementById('chat-flow').scrollHeight;
        }
        document.getElementById('user-in').addEventListener('keypress', (e) => { if(e.key === 'Enter') send(); });
    </script>
</body>
</html>
