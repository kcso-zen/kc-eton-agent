<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KC Eton | KCVision Commander</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script>
        /* ============================================================
           🔑 K C 戰略設定 (已填入你的專屬資訊)
           ============================================================ */
        const apiKey = "sk-05bc0f5f41e14a98a08255411ddf6333"; 
        const targetWhatsApp = "85294009430";
        const targetEmail = "KCVISION.info@gmail.com";

        const systemPrompt = `你現在是 KC Eton，KCVision 的首席 AI 戰略分析師。
        核心使命：消除資訊鴻溝，協助投資者從「投機者」轉向「價值佈局者」。
        專家背景：
        - Bitcoin：數位文明的度量衡與絕對稀缺資產。
        - Cardano (ADA)：科學原教旨主義、去中心化治理的終極形態。
        - Midnight & Monero：探討數據主權與隱私保護的戰略必要性，分析隱私幣在監管環境下的獨特價值。
        撰寫規範：
        - 每日一則，約 350-400 字，中英雙語對照。
        - 語氣必須具備精英感、冷靜、宏觀且具備批判性。
        - 內容要極其吸睛，展現出「只有專家才懂」的戰略維度。`;
    </script>

    <style>
        :root { --bg: #050505; --accent: #a3ff12; --card: #111; --border: #222; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #eee; min-height: 100vh; display: flex; flex-direction: column; }
        
        header { padding: 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: rgba(5,5,5,0.9); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 100; }
        .logo { font-size: 1.3rem; font-weight: 900; }
        .logo span { color: var(--accent); }

        main { flex: 1; padding: 15px; max-width: 600px; margin: 0 auto; width: 100%; }
        
        .action-card { background: var(--card); border-radius: 25px; padding: 25px; border: 1px solid var(--border); margin-bottom: 20px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .btn-main { width: 100%; background: var(--accent); color: #000; border: none; padding: 20px; border-radius: 15px; font-weight: 900; font-size: 1.1rem; margin-bottom: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; box-shadow: 0 5px 15px rgba(163, 255, 18, 0.2); }
        .btn-main:active { transform: scale(0.98); }
        
        .output-box { background: var(--card); border-radius: 20px; border: 1px solid var(--border); padding: 25px; margin-top: 10px; display: none; animation: slideIn 0.5s ease; }
        .content-text { font-size: 1rem; line-height: 1.8; white-space: pre-wrap; margin-bottom: 25px; color: #ddd; }

        .share-group { display: flex; flex-direction: column; gap: 12px; }
        .share-btn { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #333; background: #222; color: #fff; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 0.9rem; }
        .wa-btn { border-color: #25D366; color: #25D366; }
        .mail-btn { border-color: #007AFF; color: #007AFF; }

        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; } }
        .loading { color: var(--accent); font-weight: bold; padding: 15px; display: none; font-size: 0.9rem; }
    </style>
</head>
<body>

    <header>
        <div class="logo">KC <span>ETON</span></div>
        <div style="font-size: 0.6rem; background: #222; padding: 4px 10px; border-radius: 10px; color: var(--accent);">V11.0 PREMIER</div>
    </header>

    <main>
        <div class="action-card">
            <p style="font-size: 0.8rem; color: #666; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px;">Strategic Intelligence Unit</p>
            <button class="btn-main" onclick="generateStrategy()">
                <i data-lucide="sparkles"></i> 生成今日專家級戰略
            </button>
            <div id="loading" class="loading">正在穿透資訊雜訊，調取核心智庫...</div>
        </div>

        <div id="output-container" class="output-box">
            <div id="strategic-content" class="content-text"></div>
            
            <div class="share-group">
                <button class="share-btn wa-btn" onclick="shareWhatsApp()">
                    <i data-lucide="message-circle"></i> 傳送至個人 WhatsApp (9400)
                </button>
                <button class="share-btn mail-btn" onclick="shareEmail()">
                    <i data-lucide="mail"></i> 傳送至 KCVISION Email
                </button>
                <button class="share-btn" onclick="copyOnly()">
                    <i data-lucide="copy"></i> 純文字複製 (發布至 Twitter)
                </button>
            </div>
        </div>
    </main>

    <script>
        lucide.createIcons();
        let currentContent = "";

        async function generateStrategy() {
            const container = document.getElementById('output-container');
            const contentBox = document.getElementById('strategic-content');
            const loading = document.getElementById('loading');

            loading.style.display = 'block';
            container.style.display = 'none';

            try {
                const response = await fetch("https://api.deepseek.com/chat/completions", {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`
                    },
                    body: JSON.stringify({
                        model: "deepseek-chat",
                        messages: [
                            { role: "system", content: systemPrompt },
                            { role: "user", content: "請為我草擬今日最吸引、最具專家深度的一則 Twitter 戰略文章。主題必須涵蓋比特幣、ADA、Midnight 與門羅幣。約 350-400 字，中英雙語對照。" }
                        ]
                    })
                });

                const data = await response.json();
                currentContent = data.choices[0].message.content;
                contentBox.innerHTML = currentContent.replace(/\n/g, '<br>');
                container.style.display = 'block';
                
                // 自動捲動到內容區域
                setTimeout(() => {
                    container.scrollIntoView({ behavior: 'smooth' });
                }, 100);

            } catch (e) {
                alert("DeepSeek 連線異常，請檢查餘額或網絡。");
            } finally {
                loading.style.display = 'none';
            }
        }

        function shareWhatsApp() {
            if(!currentContent) return;
            const text = encodeURIComponent(currentContent);
            window.open(`https://wa.me/${targetWhatsApp}?text=${text}`, '_blank');
        }

        function shareEmail() {
            if(!currentContent) return;
            const subject = encodeURIComponent("KCVision 今日戰略導航 - 「專家評論」");
            const body = encodeURIComponent(currentContent);
            window.location.href = `mailto:${targetEmail}?subject=${subject}&body=${body}`;
        }

        function copyOnly() {
            const el = document.createElement('textarea');
            el.value = currentContent;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            alert("✅ 戰略內容已複製！");
        }
    </script>
</body>
</html>
