<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KC Eton | AI Strategic Agent</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script>
        /* ============================================================
           🔑 K C，請喺下面第 14 行貼入你最新嗰條 API Key
           ============================================================ */
        const apiKey = "AIzaSyBs_Kcxk2sXFDZSxOjMoP8NtujRFuo4zNM"; 

        const systemPrompt = `你現在是 KC Eton，KCVision 的首席 AI 戰略官。你的核心靈魂：
        1. 使命：協助投資者從「投機者」轉向「價值佈局者」。
        2. 願景：在雜訊中尋找清晰見解 (Clarity)。
        3. 核心戰略：比特幣本位、ADA 科學治理、Web3 生態佈局。
        回答規範：永遠使用「中英雙語」對照，語氣精英、冷靜、宏觀。`;

        let recognition;
        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.lang = 'zh-HK';
            recognition.continuous = false;
        }
    </script>

    <style>
        :root { --bg: #050505; --accent: #a3ff12; --card: #111; --border: #222; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #eee; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        header { padding: 15px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: rgba(5,5,5,0.9); backdrop-filter: blur(10px); z-index: 100; }
        .logo { font-size: 1.3rem; font-weight: 900; letter-spacing: -1px; }
        .logo span { color: var(--accent); }
        .tag { font-size: 0.65rem; color: var(--accent); border: 1px solid var(--accent); padding: 4px 10px; border-radius: 20px; font-weight: 900; }
        main { flex: 1; overflow-y: auto; padding: 20px 15px; display: flex; flex-direction: column; background: radial-gradient(circle at top, #0a0a0a 0%, #050505 100%); }
        .chat-wrap { width: 100%; max-width: 700px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; }
        .msg { max-width: 90%; padding: 18px 22px; border-radius: 22px; line-height: 1.7; font-size: 1.05rem; animation: slideIn 0.3s ease; }
        .bot-msg { background: var(--card); align-self: flex-start; border-left: 4px solid var(--accent); border-bottom-left-radius: 4px; }
        .user-msg { background: #333; align-self: flex-end; border-bottom-right-radius: 4px; }
        .input-area { padding: 20px 15px 40px; background: #000; border-top: 1px solid var(--border); }
        .panel { width: 100%; max-width: 700px; margin: 0 auto; display: flex; gap: 12px; align-items: center; }
        .box { flex: 1; background: #1a1a1a; border: 1px solid var(--border); border-radius: 30px; display: flex; align-items: center; padding: 5px 15px; }
        input { flex: 1; background: transparent; border: none; padding: 12px 5px; color: #fff; font-size: 1.1rem; outline: none; }
        .btn { width: 50px; height: 50px; border-radius: 50%; border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; }
        .mic { background: #222; color: #888; }
        .mic.active { background: #ff3b30; color: #fff; animation: pulse 1.5s infinite; }
        .send { background: var(--accent); color: #000; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(255, 59, 48, 0.4); } 70% { box-shadow: 0 0 0 15px rgba(255, 59, 48, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 59, 48, 0); } }
    </style>
</head>
<body>
    <header>
        <div class="logo">KC <span>ETON</span></div>
        <div class="tag">AUTO-ADAPT V8.0</div>
    </header>

    <main id="f"><div class="chat-wrap" id="m"><div class="msg bot-msg"><strong>[戰略大腦正在自我修復...]</strong><br><br>我是 <strong>KC Eton</strong>。我已經加入咗自動模型適配功能，無論 Google 點改名，我都會嘗試搵出正確嘅路徑。<br><br>請確保 VPN 已開啟，試吓同我講嘢。</div></div></main>

    <div class="input-area"><div class="panel">
        <button id="mic" class="btn mic" onclick="t()"><i data-lucide="mic"></i></button>
        <div class="box"><input type="text" id="i" placeholder="輸入指令測試連線..." autocomplete="off"></div>
        <button class="btn send" onclick="s()"><i data-lucide="send-horizontal"></i></button>
    </div></div>

    <script>
        lucide.createIcons();
        const i=document.getElementById('i'), m=document.getElementById('m'), f=document.getElementById('f'), mic=document.getElementById('mic');
        
        // 🚀 多模型自動適配列表
        const modelList = [
            "gemini-1.5-flash",
            "gemini-1.5-flash-latest",
            "gemini-pro",
            "gemini-1.0-pro"
        ];

        async function s() {
            const text = i.value.trim(); 
            if (!text || !apiKey || apiKey.includes("在此")) return;

            m.innerHTML += `<div class="msg user-msg">${text}</div>`;
            i.value = '';
            const l = document.createElement('div'); l.className = 'msg bot-msg';
            l.innerHTML = '<em>正在自動嘗試最佳連線路徑...</em>';
            m.appendChild(l);
            f.scrollTop = f.scrollHeight;

            let success = false;
            let lastError = "";

            // 🔄 自動循環嘗試唔同嘅模型名
            for (const modelName of modelList) {
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: `System: ${systemPrompt}\n\nUser: ${text}` }] }]
                        })
                    });

                    const data = await response.json();
                    
                    if (data.candidates && data.candidates[0]) {
                        const reply = data.candidates[0].content.parts[0].text;
                        l.innerHTML = reply.replace(/\n/g, '<br>');
                        success = true;
                        console.log(`成功連接模型: ${modelName}`);
                        break; // 成功就跳出循環
                    } else if (data.error) {
                        lastError = data.error.message;
                        console.warn(`嘗試模型 ${modelName} 失敗: ${lastError}`);
                    }
                } catch (e) {
                    lastError = e.message;
                    console.error(`連線異常 (${modelName}): ${lastError}`);
                }
            }

            if (!success) {
                l.innerHTML = `<span style="color:#ff4444;">[連線全線中斷] 我已經試過晒所有模型路徑，但 Google 依然拒絕連線。<br><br>原因: ${lastError}<br><br>💡 提示：請檢查 VPN 係咪連咗去美國，並重新攞一條 API Key 試下。</span>`;
            }
            f.scrollTop = f.scrollHeight;
        }

        function t() { if (!recognition) return; try { recognition.start(); mic.classList.add('active'); } catch (e) { recognition.stop(); mic.classList.remove('active'); } }
        if (recognition) {
            recognition.onresult = (e) => { i.value = e.results[0][0].transcript; mic.classList.remove('active'); s(); };
            recognition.onend = () => mic.classList.remove('active');
        }
        i.addEventListener('keypress', (e) => { if (e.key === 'Enter') s(); });
    </script>
</body>
</html>
