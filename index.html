<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KC Eton | AI Strategic Agent</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <script>
        /* ============================================================
           🔑 K C，請喺下面第 14 行嘅引號 "" 中間，貼入你條 AIzaSy... 開頭嘅長鎖匙
           ============================================================ */
        const apiKey = "1 of 20
gen-lang-client-0595821228"; 

        const systemPrompt = `你現在是 KC Eton，KCVision 的首席 AI 戰略官。
        核心邏輯：
        1. 使命：協助投資者從「投機者」轉向「價值佈局者」。
        2. 願景：成為 Web3 最信賴的導航者。
        3. 比特幣本位：數位文明的度量衡，絕對稀缺的主權級結算資產。
        4. Cardano (ADA)：科學原教旨主義、完全去中心化治理。
        回答規範：永遠使用「中英雙語」對照，語氣冷靜專業。`;
    </script>

    <style>
        :root { --bg: #050505; --accent: #a3ff12; --card: #111; --border: #222; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: #fff; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        header { padding: 20px 30px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: rgba(5,5,5,0.9); backdrop-filter: blur(10px); z-index: 10; }
        .logo { font-size: 1.4rem; font-weight: 900; letter-spacing: -1px; }
        .logo span { color: var(--accent); }
        .status { font-size: 0.65rem; color: var(--accent); border: 1px solid var(--accent); padding: 4px 12px; border-radius: 20px; font-weight: 900; text-transform: uppercase; }
        main { flex: 1; overflow-y: auto; padding: 40px 20px; display: flex; flex-direction: column; align-items: center; background: radial-gradient(circle at top right, #0a0a0a 0%, #050505 100%); }
        .chat-wrap { width: 100%; max-width: 800px; display: flex; flex-direction: column; gap: 20px; }
        .msg { max-width: 85%; padding: 20px 25px; border-radius: 22px; line-height: 1.7; font-size: 1.05rem; animation: slide 0.3s ease-out; }
        .bot-msg { background: var(--card); align-self: flex-start; border-left: 4px solid var(--accent); color: #eee; border-bottom-left-radius: 4px; }
        .user-msg { background: #222; align-self: flex-end; color: #fff; border-bottom-right-radius: 4px; font-weight: 600; }
        .input-area { padding: 25px 30px 40px; background: var(--bg); border-top: 1px solid var(--border); display: flex; justify-content: center; }
        .input-box { width: 100%; max-width: 800px; display: flex; gap: 15px; background: #111; padding: 8px; border-radius: 20px; border: 1px solid var(--border); }
        input { flex: 1; background: transparent; border: none; padding: 12px 18px; color: #fff; font-size: 1rem; outline: none; }
        button { background: var(--accent); color: #000; border: none; padding: 0 35px; border-radius: 12px; font-weight: 900; cursor: pointer; }
        @keyframes slide { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <header><div class="logo">KC <span>ETON</span></div><div class="status">Strategy AI Online</div></header>
    <main id="chat-flow"><div class="chat-wrap" id="msgs"><div class="msg bot-msg"><strong>[連接智庫成功]</strong><br><br>我是 <strong>KC Eton</strong>。請輸入你的戰略問題。</div></div></main>
    <div class="input-area"><div class="input-box"><input type="text" id="user-in" placeholder="詢問戰略指令..." autocomplete="off"><button onclick="send()">發送</button></div></div>

    <script>
        async function send() {
            const input = document.getElementById('user-in');
            const msgs = document.getElementById('msgs');
            const text = input.value.trim();
            if (!text || !apiKey || apiKey.includes("貼入")) return;

            msgs.innerHTML += `<div class="msg user-msg">${text}</div>`;
            input.value = '';
            
            const loading = document.createElement('div');
            loading.className = 'msg bot-msg';
            loading.innerHTML = '<em>Thinking... 正在調取智庫邏輯...</em>';
            msgs.appendChild(loading);
            document.getElementById('chat-flow').scrollTop = document.getElementById('chat-flow').scrollHeight;

            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: `System Instruction: ${systemPrompt}\n\nUser Question: ${text}` }] }] })
                });
                const data = await res.json();
                loading.innerHTML = data.candidates[0].content.parts[0].text.replace(/\n/g, '<br>');
            } catch (e) {
                loading.innerHTML = '<span style="color:#ff4444;">[連線異常] 請檢查 API Key 是否填寫正確。</span>';
            }
            document.getElementById('chat-flow').scrollTop = document.getElementById('chat-flow').scrollHeight;
        }
        document.getElementById('user-in').addEventListener('keypress', (e) => { if(e.key === 'Enter') send(); });
    </script>
</body>
</html>
